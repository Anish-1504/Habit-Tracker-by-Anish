<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitZAP! – Anish Patil</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --black:#1a1a1a; --white:#fffef0;
  --yellow:#FFE033; --red:#E8304A; --blue:#2D6BFF;
  --green:#2DBF6A; --orange:#FF7A1A; --purple:#9B5CF6;
  --pink:#FF4DBA;
  --bd:3px solid var(--black);
  --sh:4px 4px 0 var(--black);
  --sh-lg:6px 6px 0 var(--black);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Comic Neue',cursive;
  color:var(--black);
  background:#fffef0
    radial-gradient(circle,#d0cfc0 1px,transparent 1px);
  background-size:22px 22px;
  min-height:100vh;
}

/* ── HEADER ── */
header{
  background:var(--yellow);
  border-bottom:4px solid var(--black);
  padding:12px 20px;
  display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px;
  box-shadow:0 4px 0 var(--black);
  position:sticky; top:0; z-index:100;
}
.logo{
  font-family:'Bangers',cursive;
  font-size:clamp(22px,5vw,34px);
  letter-spacing:2px;
  text-shadow:3px 3px 0 var(--red);
  line-height:1;
}
.logo span{color:var(--red)}
.header-mid{
  font-family:'Bangers',cursive;
  font-size:clamp(14px,3vw,20px);
  letter-spacing:2px; color:var(--red);
}
.credit{
  font-family:'Bangers',cursive; font-size:12px;
  background:var(--black); color:var(--yellow);
  padding:4px 10px; border-radius:4px;
  letter-spacing:1px; white-space:nowrap;
}

/* ── CONTROLS ── */
.controls{
  background:var(--blue); border-bottom:3px solid var(--black);
  padding:10px 18px; display:flex; align-items:center;
  gap:10px; flex-wrap:wrap;
  box-shadow:0 3px 0 var(--black);
}
.controls label{
  font-family:'Bangers',cursive; font-size:15px;
  color:var(--white); letter-spacing:1px;
}
.controls select,.controls input[type=number]{
  font-family:'Comic Neue',cursive; font-weight:700; font-size:14px;
  border:3px solid var(--black); border-radius:6px;
  padding:5px 8px; background:var(--white);
  box-shadow:3px 3px 0 var(--black);
  -webkit-appearance:none; appearance:none; cursor:pointer;
}
.controls input[type=number]{width:76px}
.btn{
  font-family:'Bangers',cursive; letter-spacing:1px; font-size:14px;
  border:3px solid var(--black); border-radius:8px;
  padding:6px 14px; cursor:pointer;
  box-shadow:3px 3px 0 var(--black);
  transition:transform .1s,box-shadow .1s;
  white-space:nowrap;
}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--black)}
.btn-y{background:var(--yellow);color:var(--black)}
.btn-r{background:var(--red);color:#fff}
.btn-g{background:var(--green);color:#fff}
.btn-o{background:var(--orange);color:#fff}
.btn-b{background:var(--blue);color:#fff}

/* ── MAIN ── */
main{padding:18px;max-width:1700px;margin:0 auto}
.sec-title{
  font-family:'Bangers',cursive;
  font-size:clamp(16px,3.5vw,22px);
  letter-spacing:2px; background:var(--black);
  color:var(--yellow); display:inline-block;
  padding:3px 14px; border-radius:6px; margin-bottom:10px;
}

/* ── TABLE WRAP ── */
.tw{
  overflow-x:auto; border:3px solid var(--black);
  border-radius:10px; box-shadow:var(--sh-lg);
  background:var(--white); margin-bottom:20px;
}
table{border-collapse:collapse;min-width:860px;width:100%}
th,td{border:2px solid var(--black);text-align:center;padding:0;height:34px;min-width:26px}

/* sticky col */
.col-h{
  text-align:left; min-width:150px; max-width:210px;
  padding:0 6px; position:sticky; left:0;
  background:var(--white); z-index:2;
  border-right:3px solid var(--black);
}
thead th{
  background:var(--black); color:var(--yellow);
  font-family:'Bangers',cursive; font-size:12px; letter-spacing:1px;
  padding:5px 3px; position:sticky; top:0;
}
thead .col-h{background:var(--black);color:var(--yellow);z-index:3}

/* row alternating */
tbody tr:nth-child(odd)  .col-h{background:#fffef0}
tbody tr:nth-child(even) .col-h{background:#f3f3e0}
tbody tr:nth-child(even){background:#f9f9ee}
.row-extra .col-h{background:#eef0ff!important}
.row-extra{background:#f0f0ff}

.rnum{
  font-family:'Bangers',cursive; font-size:12px; color:#999;
  min-width:22px; width:22px; background:#f5f5e8;
  border-right:2px solid var(--black);
}

.habit-input{
  width:100%; border:none; background:transparent;
  font-family:'Comic Neue',cursive; font-weight:700; font-size:12px;
  color:var(--black); outline:none; padding:2px 0;
}
.habit-input::placeholder{color:#bbb;font-weight:400}

/* CHECKBOX */
.cbc{padding:0}
.cbc input[type=checkbox]{display:none}
.cbc label{
  display:flex; align-items:center; justify-content:center;
  width:100%; height:34px; cursor:pointer;
}
.cbc label::after{
  content:''; display:block;
  width:13px; height:13px;
  border:2.5px solid var(--black); border-radius:3px;
  background:var(--white); box-shadow:1px 1px 0 var(--black);
  transition:background .1s;
}
.cbc input[type=checkbox]:checked + label{background:#d4f7e4}
.cbc input[type=checkbox]:checked + label::after{
  content:'✓'; font-size:10px; font-weight:900;
  display:flex; align-items:center; justify-content:center;
  background:var(--green); color:#fff; border-color:var(--green);
}

.streak-td{
  font-family:'Bangers',cursive; font-size:12px;
  min-width:38px; background:#fff9cc;
  border-left:2px dashed var(--black); color:var(--orange);
}

/* DELETE */
.del-btn{
  background:none; border:none; color:var(--red);
  font-size:14px; cursor:pointer; padding:0 3px; font-weight:900;
}
.del-btn:hover{opacity:.6}

/* ADD ROW */
.add-bar{
  display:flex; align-items:center; gap:8px;
  padding:8px 12px; background:#eef5ff;
  border-top:2px dashed var(--black); flex-wrap:wrap;
}
.add-bar input{
  flex:1; min-width:140px;
  font-family:'Comic Neue',cursive; font-weight:700; font-size:13px;
  border:2px solid var(--black); border-radius:6px;
  padding:5px 10px; background:var(--white);
}

/* SLEEP */
.sdot{
  width:10px; height:10px; border-radius:50%;
  margin:auto; cursor:pointer;
  border:2px solid var(--black);
  transition:background .15s,transform .15s;
  background:#ddd;
}
.sdot.on{
  background:var(--blue); transform:scale(1.3);
  box-shadow:0 0 0 3px var(--yellow),0 0 0 5px var(--black);
}

/* NOTES */
.notes-box{
  border:3px solid var(--black); border-radius:10px;
  box-shadow:var(--sh); background:#fffef0;
  padding:12px; margin-bottom:20px;
}
.notes-box textarea{
  width:100%; min-height:76px;
  border:2px dashed #bbb; border-radius:6px;
  font-family:'Comic Neue',cursive; font-size:13px;
  padding:8px; background:transparent; resize:vertical; outline:none;
}

/* CHARTS */
.charts-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
  gap:14px;
}
.chart-card{
  border:3px solid var(--black); border-radius:10px;
  background:var(--white); box-shadow:var(--sh); overflow:hidden;
}
.chart-hd{
  background:var(--black); color:var(--yellow);
  font-family:'Bangers',cursive; font-size:13px; letter-spacing:1px;
  padding:5px 10px; display:flex; justify-content:space-between;
}
.chart-card canvas{display:block;width:100%!important}

/* POW */
.pow{
  position:fixed; pointer-events:none;
  font-family:'Bangers',cursive; font-size:26px;
  color:var(--yellow); text-shadow:2px 2px 0 var(--black);
  animation:pow .7s ease forwards; z-index:9999;
}
@keyframes pow{
  0%  {opacity:1;transform:scale(1) translateY(0)}
  100%{opacity:0;transform:scale(2.5) translateY(-40px)}
}

/* FOOTER */
footer{
  text-align:center; padding:14px;
  font-family:'Bangers',cursive; font-size:13px;
  letter-spacing:1px; color:#888;
  border-top:3px solid var(--black);
  background:var(--yellow); box-shadow:0 -3px 0 var(--black);
}

/* RESPONSIVE */
@media(max-width:600px){
  header{padding:8px 12px}
  .controls{padding:8px 10px;gap:6px}
  main{padding:10px}
  .charts-grid{grid-template-columns:1fr}
  th,td{font-size:10px;min-width:20px;height:28px}
  .col-h{min-width:110px}
  .cbc label::after{width:11px;height:11px}
}

/* PRINT */
@media print{
  body{background:white!important;background-image:none!important}
  header,footer{box-shadow:none!important}
  .btn,.add-bar,.controls .btn{display:none!important}
  .tw{overflow:visible!important;box-shadow:none!important}
  table{min-width:unset!important;font-size:9px}
  .col-h{min-width:90px!important}
  th,td{height:22px!important}
  .charts-grid{grid-template-columns:1fr 1fr!important}
}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">💥 Habit<span>ZAP!</span></div>
  <div class="header-mid" id="monthLabel">– Select a Month –</div>
  <div class="credit">Created by : Anish Patil &nbsp;|&nbsp; Small Habits. Big Change.</div>
</header>

<!-- CONTROLS -->
<div class="controls">
  <label>📅</label>
  <select id="selMonth">
    <option value="0">January</option><option value="1">February</option>
    <option value="2">March</option><option value="3">April</option>
    <option value="4">May</option><option value="5">June</option>
    <option value="6">July</option><option value="7">August</option>
    <option value="8">September</option><option value="9">October</option>
    <option value="10">November</option><option value="11">December</option>
  </select>
  <label>Year:</label>
  <input type="number" id="selYear" min="2020" max="2099">
  <button class="btn btn-y" onclick="loadMonth()">⚡ Load</button>
  <button class="btn btn-g" onclick="saveData()">💾 Save</button>
  <button class="btn btn-o" onclick="exportPDF()">🖨️ Print/PDF</button>
  <button class="btn btn-r" onclick="clearMonth()">🗑️ Clear</button>
</div>

<main>

  <!-- HABITS -->
  <div class="sec-title">📋 Habits Tracker</div>
  <div class="tw" id="htw">
    <table id="habitTable">
      <thead id="habitHead"></thead>
      <tbody id="habitBody"></tbody>
      <tfoot><tr><td colspan="99" style="padding:0">
        <div class="add-bar">
          <input id="newHabitInput" type="text" placeholder="✏️ Type new habit & press Enter or click +"
                 maxlength="60" onkeydown="if(event.key==='Enter')addRow()">
          <button class="btn btn-b" onclick="addRow()">+ Add Row</button>
        </div>
      </td></tr></tfoot>
    </table>
  </div>

  <!-- SLEEP -->
  <div class="sec-title">😴 Sleep Tracker</div>
  <div class="tw">
    <table id="sleepTable">
      <thead id="sleepHead"></thead>
      <tbody id="sleepBody"></tbody>
    </table>
  </div>

  <!-- NOTES -->
  <div class="notes-box">
    <div class="sec-title" style="font-size:15px">📝 Notes</div><br>
    <textarea id="notesArea" placeholder="Monthly notes, reflections, wins… ✍️"></textarea>
  </div>

  <!-- CHARTS -->
  <div class="sec-title">📊 Progress Charts</div>
  <div class="charts-grid" id="chartsGrid"></div>

</main>

<footer>HabitZAP! &nbsp;|&nbsp; Created by Anish Patil &nbsp;|&nbsp; Small Habits. Big Change. 💥</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
/* ─── CONSTANTS ─── */
const FIXED = 10;
const MONTHS = ["January","February","March","April","May","June",
                "July","August","September","October","November","December"];
const SLEEP_LEVELS = [9,8,7,6,5];
const COLORS = ['#E8304A','#2D6BFF','#2DBF6A','#FF7A1A','#9B5CF6',
                '#FF4DBA','#00BCD4','#8BC34A','#FF5722','#795548',
                '#E91E63','#3F51B5','#009688','#FF9800','#673AB7'];

/* ─── STATE ─── */
let S = { month:0, year:2025, habits:[], sleep:{}, notes:'' };
let charts = {};

/* ─── STORAGE ─── */
const key = () => `hz_${S.year}_${S.month}`;

function saveData(){
  S.notes = document.getElementById('notesArea').value;
  // sync habit names from inputs
  document.querySelectorAll('.habit-input').forEach(inp => {
    const i = +inp.dataset.idx;
    if (S.habits[i]) S.habits[i].name = inp.value;
  });
  localStorage.setItem(key(), JSON.stringify({habits:S.habits, sleep:S.sleep, notes:S.notes}));
  pow('💾 SAVED!');
}

function loadData(){
  const raw = localStorage.getItem(key());
  if(raw){
    const d = JSON.parse(raw);
    S.habits = d.habits||[];
    S.sleep  = d.sleep ||{};
    S.notes  = d.notes ||'';
  } else {
    S.habits = Array.from({length:FIXED},()=>({name:'',fixed:true,checks:{}}));
    S.sleep  = {};
    S.notes  = '';
  }
  // ensure at least FIXED fixed rows
  const fixedCount = S.habits.filter(h=>h.fixed).length;
  if(fixedCount < FIXED){
    const missing = FIXED - fixedCount;
    for(let i=0;i<missing;i++) S.habits.unshift({name:'',fixed:true,checks:{}});
  }
}

function clearMonth(){
  if(!confirm('Clear all data for '+MONTHS[S.month]+' '+S.year+'?')) return;
  localStorage.removeItem(key());
  loadMonth();
  pow('🗑️ CLEARED!');
}

/* ─── DAYS ─── */
const daysIn = (y,m) => new Date(y,m+1,0).getDate();

/* ─── LOAD MONTH ─── */
function loadMonth(){
  S.month = +document.getElementById('selMonth').value;
  S.year  = +document.getElementById('selYear').value;
  document.getElementById('monthLabel').textContent = MONTHS[S.month]+' '+S.year;
  loadData();
  document.getElementById('notesArea').value = S.notes;
  renderHabits();
  renderSleep();
  renderCharts();
}

/* ─── HABITS TABLE ─── */
function renderHabits(){
  const days = daysIn(S.year, S.month);
  // header
  let h = `<tr><th class="rnum">#</th><th class="col-h">HABITS / DAYS</th>`;
  for(let d=1;d<=days;d++) h+=`<th>${d}</th>`;
  h+=`<th class="streak-td">🔥</th></tr>`;
  document.getElementById('habitHead').innerHTML = h;
  // body
  const body = document.getElementById('habitBody');
  body.innerHTML = '';
  S.habits.forEach((hb,i) => body.appendChild(makeRow(hb,i,days)));
}

function makeRow(hb,idx,days){
  const tr = document.createElement('tr');
  tr.className = hb.fixed ? 'row-fixed':'row-extra';
  tr.dataset.idx = idx;

  // # cell
  const rn = document.createElement('td');
  rn.className='rnum'; rn.textContent = idx+1;
  tr.appendChild(rn);

  // name cell
  const nc = document.createElement('td');
  nc.className='col-h';
  const inp = document.createElement('input');
  inp.type='text'; inp.className='habit-input';
  inp.dataset.idx = idx;
  inp.value = hb.name;
  inp.placeholder = hb.fixed ? `Habit ${idx+1}…` : 'Custom habit…';
  inp.maxLength=60;
  inp.addEventListener('change',()=>{
    S.habits[idx].name = inp.value;
    renderCharts();
  });
  nc.appendChild(inp);
  if(!hb.fixed){
    const db = document.createElement('button');
    db.className='del-btn'; db.title='Delete'; db.textContent='✕';
    db.onclick=()=>{ S.habits.splice(idx,1); renderHabits(); renderCharts(); };
    nc.appendChild(db);
  }
  tr.appendChild(nc);

  // checkboxes
  for(let d=1;d<=days;d++){
    const td = document.createElement('td');
    td.className='cbc';
    const id=`c_${idx}_${d}`;
    const cb = document.createElement('input');
    cb.type='checkbox'; cb.id=id; cb.checked=!!hb.checks[d];
    cb.addEventListener('change',()=>{
      S.habits[idx].checks[d] = cb.checked;
      updateStreak(tr,idx,days);
      renderCharts();
      if(cb.checked) pow(['✅ POW!','🎉 BOOM!','⚡ ZAP!','💥 YES!'][Math.floor(Math.random()*4)]);
    });
    const lbl = document.createElement('label');
    lbl.htmlFor=id;
    td.appendChild(cb); td.appendChild(lbl);
    tr.appendChild(td);
  }

  // streak
  const st = document.createElement('td');
  st.className='streak-td'; st.dataset.sc='1';
  st.textContent = streak(hb,days)+'🔥';
  tr.appendChild(st);
  return tr;
}

function streak(hb,days){
  let s=0;
  for(let d=days;d>=1;d--){ if(hb.checks[d]) s++; else break; }
  return s;
}

function updateStreak(tr,idx,days){
  const c=tr.querySelector('[data-sc]');
  if(c) c.textContent=streak(S.habits[idx],days)+'🔥';
}

function addRow(){
  const inp=document.getElementById('newHabitInput');
  const name=inp.value.trim();
  S.habits.push({name,fixed:false,checks:{}});
  inp.value='';
  renderHabits();
  renderCharts();
  document.getElementById('htw').scrollIntoView({behavior:'smooth',block:'end'});
}

/* ─── SLEEP TABLE ─── */
function renderSleep(){
  const days=daysIn(S.year,S.month);
  let h=`<tr><th class="col-h">Sleep</th>`;
  for(let d=1;d<=days;d++) h+=`<th>${d}</th>`;
  h+=`</tr>`;
  document.getElementById('sleepHead').innerHTML=h;

  const body=document.getElementById('sleepBody');
  body.innerHTML='';
  SLEEP_LEVELS.forEach(hrs=>{
    const tr=document.createElement('tr');
    const th=document.createElement('td');
    th.className='col-h'; th.style.fontWeight='700';
    th.textContent=`${hrs} hrs`;
    tr.appendChild(th);
    for(let d=1;d<=days;d++){
      const td=document.createElement('td');
      const dot=document.createElement('div');
      dot.className='sdot'+(S.sleep[d]===hrs?' on':'');
      dot.onclick=()=>{
        S.sleep[d] = S.sleep[d]===hrs ? undefined : hrs;
        renderSleep();
        renderCharts();
      };
      td.appendChild(dot); tr.appendChild(td);
    }
    body.appendChild(tr);
  });
}

/* ─── CHARTS ─── */
function renderCharts(){
  Object.values(charts).forEach(c=>c.destroy());
  charts={};
  const grid=document.getElementById('chartsGrid');
  grid.innerHTML='';
  const days=daysIn(S.year,S.month);
  const labels=Array.from({length:days},(_,i)=>i+1);

  /* per-habit bar + cumulative line */
  S.habits.forEach((hb,idx)=>{
    const name=hb.name||`Habit ${idx+1}`;
    const done=Object.values(hb.checks).filter(Boolean).length;
    if(!done && !hb.name) return;
    const col=COLORS[idx%COLORS.length];
    const card=document.createElement('div');
    card.className='chart-card';
    const pct=days?Math.round(done/days*100):0;
    card.innerHTML=`
      <div class="chart-hd"><span>${name}</span><span>${done}/${days} (${pct}%)</span></div>
      <canvas id="ch_${idx}" height="140"></canvas>`;
    grid.appendChild(card);
    setTimeout(()=>{
      const ctx=document.getElementById(`ch_${idx}`);
      if(!ctx) return;
      const data=labels.map(d=>hb.checks[d]?1:0);
      let c=0;
      const cum=data.map(v=>{c+=v;return c});
      charts[idx]=new Chart(ctx,{
        data:{
          labels,
          datasets:[
            {type:'bar',data,
             backgroundColor:data.map(v=>v?col+'cc':'#eee'),
             borderColor:data.map(v=>v?col:'#ccc'),
             borderWidth:2,borderRadius:4},
            {type:'line',data:cum,borderColor:'#1a1a1a',borderWidth:2,
             pointRadius:2,fill:false,yAxisID:'y2',tension:.4}
          ]
        },
        options:{
          responsive:true,
          plugins:{legend:{display:false},tooltip:{mode:'index'}},
          scales:{
            y:{min:0,max:1,ticks:{stepSize:1,font:{family:'Comic Neue'}},grid:{color:'#eee'}},
            y2:{position:'right',min:0,max:days,ticks:{font:{family:'Comic Neue'}},grid:{display:false}},
            x:{ticks:{font:{family:'Comic Neue',size:10}},grid:{display:false}}
          }
        }
      });
    },0);
  });

  /* sleep line */
  const sc=document.createElement('div');
  sc.className='chart-card';
  sc.innerHTML=`<div class="chart-hd"><span>😴 Sleep Hours</span><span>${MONTHS[S.month]}</span></div>
    <canvas id="ch_sleep" height="140"></canvas>`;
  grid.appendChild(sc);
  setTimeout(()=>{
    const ctx=document.getElementById('ch_sleep');
    if(!ctx) return;
    const data=labels.map(d=>S.sleep[d]||null);
    charts['sleep']=new Chart(ctx,{
      type:'line',
      data:{labels,datasets:[{
        label:'Sleep hrs',data,
        borderColor:'#2D6BFF',backgroundColor:'#2D6BFF22',
        borderWidth:2.5,pointRadius:4,
        pointBackgroundColor:'#2D6BFF',pointBorderColor:'#1a1a1a',pointBorderWidth:2,
        fill:true,tension:.35,spanGaps:true
      }]},
      options:{
        responsive:true,
        plugins:{legend:{display:false}},
        scales:{
          y:{min:4,max:10,ticks:{stepSize:1,font:{family:'Comic Neue'}},grid:{color:'#eee'}},
          x:{ticks:{font:{family:'Comic Neue',size:10}},grid:{display:false}}
        }
      }
    });
  },0);

  /* overall donut */
  const total=S.habits.reduce((s,h)=>s+Object.values(h.checks).filter(Boolean).length,0);
  const possible=S.habits.length*days;
  if(possible>0){
    const dc=document.createElement('div');
    dc.className='chart-card';
    const pct=Math.round(total/possible*100);
    dc.innerHTML=`<div class="chart-hd"><span>🏆 Overall</span><span>${pct}%</span></div>
      <canvas id="ch_donut" height="140"></canvas>`;
    grid.appendChild(dc);
    setTimeout(()=>{
      const ctx=document.getElementById('ch_donut');
      if(!ctx) return;
      charts['donut']=new Chart(ctx,{
        type:'doughnut',
        data:{
          labels:['Done','Remaining'],
          datasets:[{data:[total,possible-total],
            backgroundColor:['#2DBF6A','#eee'],
            borderColor:['#1a1a1a','#ccc'],borderWidth:2}]
        },
        options:{
          responsive:true,cutout:'65%',
          plugins:{legend:{labels:{font:{family:'Comic Neue'}}}}
        }
      });
    },0);
  }

  /* weekly heatmap bar per habit */
  const habitsWithData = S.habits.filter(h=>Object.values(h.checks).some(Boolean));
  if(habitsWithData.length>0){
    const wc=document.createElement('div');
    wc.className='chart-card';
    const weeklyData = habitsWithData.map(h=>{
      let wk=[0,0,0,0,0]; // week1-5
      for(let d=1;d<=days;d++){
        if(h.checks[d]) wk[Math.floor((d-1)/7)]++;
      }
      return {name:h.name||'(unnamed)', wk};
    });
    wc.innerHTML=`<div class="chart-hd"><span>📆 Weekly Breakdown</span><span>Top habits</span></div>
      <canvas id="ch_weekly" height="160"></canvas>`;
    grid.appendChild(wc);
    setTimeout(()=>{
      const ctx=document.getElementById('ch_weekly');
      if(!ctx) return;
      const wkLabels=['Week 1','Week 2','Week 3','Week 4','Week 5'];
      charts['weekly']=new Chart(ctx,{
        type:'bar',
        data:{
          labels:wkLabels,
          datasets: habitsWithData.slice(0,5).map((h,i)=>({
            label: h.name||`Habit ${i+1}`,
            data: weeklyData[i].wk,
            backgroundColor: COLORS[i]+'bb',
            borderColor: COLORS[i],
            borderWidth:2,borderRadius:4,
          }))
        },
        options:{
          responsive:true,
          plugins:{legend:{labels:{font:{family:'Comic Neue',size:10}}}},
          scales:{
            y:{min:0,ticks:{stepSize:1,font:{family:'Comic Neue'}},grid:{color:'#eee'}},
            x:{ticks:{font:{family:'Comic Neue',size:10}},grid:{display:false}}
          }
        }
      });
    },0);
  }
}

/* ─── POW ─── */
function pow(text){
  const el=document.createElement('div');
  el.className='pow'; el.textContent=text;
  el.style.left=(Math.random()*60+20)+'%';
  el.style.top=(Math.random()*30+20)+'%';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),800);
}

/* ─── PRINT ─── */
function exportPDF(){ saveData(); window.print(); }

/* ─── AUTO-SAVE ─── */
window.addEventListener('beforeunload',saveData);

/* ─── INIT ─── */
window.addEventListener('DOMContentLoaded',()=>{
  const now=new Date();
  document.getElementById('selMonth').value=now.getMonth();
  document.getElementById('selYear').value=now.getFullYear();
  loadMonth();
});
</script>
